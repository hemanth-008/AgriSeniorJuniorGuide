<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Network | AgriSeniorJuniorGuide</title>
  
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="sidebar">
      <div class="dashboard-sidebar__header">
        <a href="../index.html" class="logo">
          <div class="logo__icon" style="width: 28px; height: 28px;">
            <i data-lucide="leaf" style="width: 16px; height: 16px;"></i>
          </div>
          <div class="logo__text" style="font-size: 16px;">Agri<span>SJ</span>Guide</div>
        </a>
      </div>
      
      <nav class="dashboard-sidebar__nav">
        <div class="dashboard-sidebar__section-title">Dashboard</div>
        <a href="junior-dashboard.html" class="dashboard-sidebar__link"><i data-lucide="layout-dashboard"></i> Overview</a>
        
        <div class="dashboard-sidebar__section-title mt-3">My Learning</div>
        <a href="courses.html" class="dashboard-sidebar__link"><i data-lucide="play-circle"></i> Browse Courses</a>
        <a href="test-list.html" class="dashboard-sidebar__link"><i data-lucide="check-square"></i> Take a Test</a>
        <a href="junior-dashboard.html#submit-assignment-section" class="dashboard-sidebar__link"><i data-lucide="upload-cloud"></i> Submit Assignment</a>
        
        <div class="dashboard-sidebar__section-title mt-3">Networking</div>
        <a href="network.html" class="dashboard-sidebar__link active"><i data-lucide="users"></i> Find a Senior</a>
      </nav>

      <div class="dashboard-sidebar__footer">
        <div class="dashboard-sidebar__user">
          <div class="avatar avatar--sm" id="user-initials">J</div>
          <div class="dashboard-sidebar__user-info">
            <div class="dashboard-sidebar__user-name" id="user-name">Junior Student</div>
            <div class="dashboard-sidebar__user-role text-muted">Junior</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="flex items-center gap-2">
          <h1 class="dashboard-topbar__title">Mentor Network</h1>
        </div>
      </header>

      <div class="dashboard-content container">
        <div class="search-bar mb-4" style="max-width: 100%;">
          <i data-lucide="search" class="search-bar__icon"></i>
          <input type="text" class="form-input" id="mentor-search" placeholder="Search by name, university, or specialization...">
        </div>

        <div id="mentors-container" class="grid-3">
          <div class="empty-state" style="grid-column: 1 / -1;">
             <div class="spinner mx-auto mb-2"></div>
             Loading network...
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { AuthStore } from '../js/auth.js';
    import { supabase } from '../js/supabase.js';

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Auth check — get session
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      // 2. Fetch fresh role from profiles table (NEVER trust user_metadata)
      const { data: profile } = await supabase
        .from('profiles')
        .select('role, full_name, university, avatar_url')
        .eq('id', session.user.id)
        .single();

      const role = (profile?.role || 'junior').toLowerCase();

      // 3. If not junior, redirect to the correct dashboard
      if (role === 'admin') {
        window.location.href = '../admin/index.html';
        return;
      }
      if (role === 'senior') {
        window.location.href = 'senior-dashboard.html';
        return;
      }
      
      // Update UI with profile data
      const displayName = profile?.full_name || session.user.email;
      const nameEl = document.getElementById('user-name');
      const initialsEl = document.getElementById('user-initials');
      if (nameEl) nameEl.textContent = displayName;
      if (initialsEl) {
        if (profile?.avatar_url) {
          initialsEl.innerHTML = `<img src="${profile.avatar_url}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        } else {
          initialsEl.textContent = displayName.charAt(0).toUpperCase();
        }
      }

      lucide.createIcons();

      // Fetch Seniors
      try {
        const { data: seniors, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('role', 'SENIOR')
          .eq('available_for_mentorship', true);

        if (error) throw error;

        const container = document.getElementById('mentors-container');
        
        if (!seniors || seniors.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1; padding: var(--space-6);">
              <i data-lucide="users" class="empty-state__icon" style="width: 48px; height: 48px; margin-bottom: 16px;"></i>
              <h3 class="empty-state__title">Seniors will appear here once verified by admin</h3>
              <p class="empty-state__text">We are onboarding top ICAR rankers. Check back soon.</p>
            </div>
          `;
          lucide.createIcons();
          return;
        }

        let html = '';
        seniors.forEach(senior => {
          const avatarContent = senior.avatar_url 
            ? `<img src="${senior.avatar_url}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
            : (senior.full_name ? senior.full_name.charAt(0).toUpperCase() : 'S');
            
          html += `
            <div class="card card--elevated flex-col justify-between">
              <div>
                <div class="flex items-center gap-3 mb-3">
                  <div class="avatar avatar--lg">${avatarContent}</div>
                  <div>
                    <h3 class="card__title m-0">${senior.full_name || 'Senior Mentor'}</h3>
                    <div class="badge badge--university mt-1">${senior.university || 'ICAR Institute'}</div>
                  </div>
                </div>
                <div class="text-sm mb-2"><strong class="text-charcoal">Specialization:</strong> ${senior.specialization || 'Not specified'}</div>
                <div class="text-sm mb-3"><strong class="text-charcoal">JRF Rank:</strong> ${senior.jrf_rank ? '#' + senior.jrf_rank : 'N/A'}</div>
                <p class="text-sm text-muted mb-4">${senior.bio || 'Happy to guide juniors.'}</p>
              </div>
              <button class="btn btn--primary btn--full request-btn" data-id="${senior.id}" data-name="${senior.full_name || 'this senior'}">Request Mentorship</button>
            </div>
          `;
        });
        container.innerHTML = html;
        lucide.createIcons();

        // Bind Request buttons
        document.querySelectorAll('.request-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const seniorId = e.target.getAttribute('data-id');
            const seniorName = e.target.getAttribute('data-name');
            
            const confirmMsg = confirm(`Send a mentorship request to ${seniorName}?`);
            if(!confirmMsg) return;

            e.target.disabled = true;
            e.target.textContent = "Sending...";

            try {
              const { data: { session } } = await window.supabase.auth.getSession();
              if(!session) throw new Error("Not authenticated");

              const { error: insertErr } = await window.supabase.from('mentor_requests').insert({
                junior_id: session.user.id,
                senior_id: seniorId,
                status: 'pending'
              });

              if (insertErr) throw insertErr;

              e.target.textContent = "Request Sent";
              e.target.classList.remove('btn--primary');
              e.target.classList.add('btn--success'); // Assuming we add a btn--success or just keep it disabled
              e.target.style.background = 'var(--color-success)';
              e.target.style.borderColor = 'var(--color-success)';

            } catch(err) {
              alert("Error sending request: " + err.message);
              e.target.disabled = false;
              e.target.textContent = "Request Mentorship";
            }
          });
        });
      } catch (err) {
        console.error("Seniors fetch error:", err);
      }
    });
  </script>
</body>
</html>
